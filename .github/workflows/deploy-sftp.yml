name: Deploy to LWS via FTPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTPS
        env:
          FTP_HOST: ${{ secrets.SFTP_HOST }}
          FTP_PORT: ${{ secrets.SFTP_PORT }}
          FTP_USERNAME: ${{ secrets.SFTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.SFTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.SFTP_REMOTE_DIR }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "ftp://$FTP_HOST:$FTP_PORT" <<EOF
          set ftp:ssl-allow yes
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate no
          set net:max-retries 2
          set net:timeout 20
          mirror -R \
            --verbose \
            --exclude-glob .git* \
            --exclude .github/ \
            ./ "$FTP_REMOTE_DIR"
          bye
          EOF
